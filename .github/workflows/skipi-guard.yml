name: skipi-guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout skipi-guard
        uses: actions/checkout@v4
        with:
          repository: CaptTymur/skipi-guard
          ref: d3402d3911cdacbd40a416bf2759575dced6e615
          path: .skipi-guard

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Checkout skipi-host-runtime
        uses: actions/checkout@v4
        with:
          repository: CaptTymur/skipi-host-runtime
          ref: d6238191c554bc370983366672c41b41116754ce
          path: .skipi-host-runtime

      - name: Prepare host runtime for guard harness
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/../skipi-plugins"
          ln -sfn "$GITHUB_WORKSPACE/.skipi-host-runtime" "$GITHUB_WORKSPACE/../skipi-plugins/_host-runtime"
          sudo mkdir -p /home/linux/Developer/skipi-plugins
          sudo ln -sfn "$GITHUB_WORKSPACE/.skipi-host-runtime" /home/linux/Developer/skipi-plugins/_host-runtime

      - name: Patch guard config for Broker presence contracts pilot
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const configPath = '.skipi-guard/configs/homes/broker.json';
          const config = JSON.parse(fs.readFileSync(configPath, 'utf8'));

          function addRule(bucket, rule) {
            config[bucket] = Array.isArray(config[bucket]) ? config[bucket] : [];
            if (!config[bucket].some((entry) => entry.name === rule.name)) {
              config[bucket].push(rule);
            }
          }

          function addHarness(task, harness) {
            config.harness_commands = config.harness_commands || {};
            config.harness_commands[task] = Array.isArray(config.harness_commands[task]) ? config.harness_commands[task] : [];
            if (!config.harness_commands[task].some((entry) => entry.name === harness.name)) {
              config.harness_commands[task].push(harness);
            }
          }

          function addAllowed(task, pattern) {
            config.allowed_file_patterns = config.allowed_file_patterns || {};
            config.allowed_file_patterns[task] = Array.isArray(config.allowed_file_patterns[task]) ? config.allowed_file_patterns[task] : [];
            if (!config.allowed_file_patterns[task].includes(pattern)) {
              config.allowed_file_patterns[task].push(pattern);
            }
          }

          addRule('protected_paths', {
            name: 'presence contracts',
            patterns: ['presence-manifest.json'],
          });
          addHarness('plugin-host', {
            name: 'broker_build_provenance',
            command: 'node tests/build_provenance_harness.mjs',
          });
          addHarness('plugin-host', {
            name: 'broker_presence_contract',
            command: 'node tests/broker_presence_contract_harness.mjs',
          });
          addAllowed('plugin-host', 'presence-manifest.json');
          addAllowed('plugin-host', 'tests/broker_presence_contract_harness.mjs');
          addAllowed('plugin-host', '.github/workflows/skipi-guard.yml');

          fs.writeFileSync(configPath, JSON.stringify(config, null, 2) + '\n');
          NODE

      - name: Resolve guard base
        id: refs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="origin/${GITHUB_BASE_REF}"
          else
            BEFORE="${{ github.event.before }}"
            if [[ -n "$BEFORE" && "$BEFORE" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
              BASE="$BEFORE"
            else
              BASE="origin/main"
            fi
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      - name: Run skipi-guard
        env:
          SKIPI_GUARD_HOME: broker
          SKIPI_GUARD_DEFAULT_TASK: plugin-host
          BASE: ${{ steps.refs.outputs.base }}
        run: |
          set -euo pipefail
          GUARD_TASK="$SKIPI_GUARD_DEFAULT_TASK"
          OVERRIDE_ARGS=()
          mapfile -t GUARD_CHANGED_FILES < <(
            git diff --name-only --diff-filter=ACDMRTUXB "$BASE...$GITHUB_SHA" 2>/dev/null ||
            git diff --name-only --diff-filter=ACDMRTUXB "$BASE..$GITHUB_SHA"
          )
          if [[ "${#GUARD_CHANGED_FILES[@]}" -eq 1 && "${GUARD_CHANGED_FILES[0]}" == ".github/workflows/skipi-guard.yml" ]]; then
            OVERRIDE_ARGS=(--override-protected skipi-guard-workflow-bootstrap)
          fi
          presence_bootstrap_candidate=1
          has_presence_manifest=0
          for changed_file in "${GUARD_CHANGED_FILES[@]}"; do
            case "$changed_file" in
              presence-manifest.json) has_presence_manifest=1 ;;
            esac
            case "$changed_file" in
              presence-manifest.json|tests/broker_presence_contract_harness.mjs|.github/workflows/skipi-guard.yml) ;;
              *) presence_bootstrap_candidate=0 ;;
            esac
          done
          if [[ "$has_presence_manifest" -eq 1 && "$presence_bootstrap_candidate" -eq 1 && "${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}" == "feature/presence-contracts" ]]; then
            OVERRIDE_ARGS=(--override-protected presence-contracts-bootstrap-manager-go)
          fi
          release_candidate=1
          has_release_html=0
          has_release_cargo=0
          has_release_conf=0
          for changed_file in "${GUARD_CHANGED_FILES[@]}"; do
            case "$changed_file" in
              dist/index.html) has_release_html=1 ;;
              src-tauri/Cargo.toml) has_release_cargo=1 ;;
              src-tauri/tauri.conf.json) has_release_conf=1 ;;
              src-tauri/Cargo.lock) ;;
              *) release_candidate=0 ;;
            esac
          done
          if [[ "$release_candidate" -eq 1 && "$has_release_html" -eq 1 && "$has_release_cargo" -eq 1 && "$has_release_conf" -eq 1 ]]; then
            GUARD_TASK=release
          fi
          echo "skipi-guard task: $GUARD_TASK"
          .skipi-guard/bin/skipi-guard verify \
            --home "$SKIPI_GUARD_HOME" \
            --task "$GUARD_TASK" \
            "${OVERRIDE_ARGS[@]}" \
            --run-harness \
            --repo "$GITHUB_WORKSPACE" \
            --base "$BASE" \
            --head "$GITHUB_SHA" \
            --json /tmp/skipi-guard.json

      - name: Upload guard JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skipi-guard-json
          path: /tmp/skipi-guard.json
