<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skipi Broker</title>
<script>
var APP_VERSION='0.1.25';
function updateTitlebar(){ document.title='Skipi Broker '+APP_VERSION; }
document.addEventListener('DOMContentLoaded', function(){ updateTitlebar(); });
</script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root, [data-theme="dark"] {
    --bg:#1e1e1e; --surface:#252525; --surface2:#2d2d2d; --surface3:#333;
    --text:#dcddde; --text2:#888; --text3:#666;
    --accent:#7c6ff7; --accent-bg:rgba(124,111,247,0.15); --accent-bg2:rgba(124,111,247,0.3);
    --border:#333; --hover:rgba(255,255,255,0.05);
    --green:#4ec970; --red:#e55561; --yellow:#e2b93d; --orange:#d89b65; --blue:#5b9be0;
    --statusbar:#1a1a1a;
    --font-ui:-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-mono:"SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    --font-size-ui:13px;
}
[data-theme="light"] {
    --bg:#fff; --surface:#f6f6f6; --surface2:#eee; --surface3:#e0e0e0;
    --text:#1e1e1e; --text2:#666; --text3:#999;
    --accent:#6c5ce7; --accent-bg:rgba(108,92,231,0.1); --accent-bg2:rgba(108,92,231,0.2);
    --border:#ddd; --hover:rgba(0,0,0,0.04);
    --green:#27ae60; --red:#e74c3c; --yellow:#f39c12; --orange:#e67e22; --blue:#2980b9;
    --statusbar:#f0f0f0;
}
body { background:var(--bg); color:var(--text); font-family:var(--font-ui);
    font-size:var(--font-size-ui); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
::selection { background:var(--accent-bg2); }
input, select, button, textarea { font-family:var(--font-ui); font-size:var(--font-size-ui); color:inherit; }
a { color:var(--accent); text-decoration:none; cursor:pointer; }
a:hover { text-decoration:underline; }
code { background:var(--surface2); padding:1px 5px; border-radius:3px; font:11px var(--font-mono); }

/* Modules bar */
.modules-bar { display:flex; align-items:center; height:34px; background:var(--surface);
    border-bottom:1px solid var(--border); padding:0 8px; gap:2px; flex-shrink:0; }
.mod-tab { display:flex; align-items:center; justify-content:center; gap:6px; height:26px;
    min-width:90px; padding:0 12px; border-radius:5px; cursor:pointer; color:var(--text2); font-size:12px; }
.mod-tab:hover { color:var(--text); background:var(--hover); }
.mod-tab.active { color:#fff; background:var(--accent); font-weight:600; }
.mb-spacer { flex:1; }
.mb-identity { font-size:11px; color:var(--text2); padding:0 10px; }
.mb-identity strong { color:var(--text); }
.mb-gear { width:28px; height:28px; display:flex; align-items:center; justify-content:center;
    border-radius:5px; cursor:pointer; color:var(--text2); font-size:14px; }
.mb-gear:hover { color:var(--text); background:var(--hover); }

/* App layout: 4-panel column-view + status bar */
.app { display:flex; flex:1; flex-direction:column; overflow:hidden; }
.columns { flex:1; display:flex; overflow:hidden; }
.col { flex:1; min-width:200px; display:flex; flex-direction:column;
    border-right:1px solid var(--border); overflow:hidden; }
.col:last-child { border-right:none; }
.col-head { display:flex; align-items:center; justify-content:space-between; gap:6px;
    height:32px; padding:0 12px; background:var(--surface); border-bottom:1px solid var(--border);
    font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; flex-shrink:0; }
.col-head .count { color:var(--text3); font-weight:400; }
.p2-tab { padding:1px 7px; border-radius:9px; font-size:10px; cursor:pointer;
    color:var(--text2); background:var(--surface2); user-select:none; }
.p2-tab:hover { color:var(--text); }
.p2-tab.active { color:#fff; background:var(--accent); }
.p2-refresh { font-size:13px; cursor:pointer; padding:1px 6px; border-radius:9px;
    color:var(--text2); user-select:none; }
.p2-refresh:hover { color:var(--text); background:var(--surface2); }
.p2-refresh.spinning { animation: spin 1s linear infinite; color:var(--accent); }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.row .r-pin { color:var(--accent); font-size:11px; margin-right:4px; }
.row .r-hot { font-size:12px; margin-right:2px; }
.row.hot { box-shadow: inset 3px 0 0 var(--red); }
.row.pinned { background:linear-gradient(90deg, var(--accent-bg) 0%, transparent 60%); }
.row.pinned:hover { background:linear-gradient(90deg, var(--accent-bg2) 0%, var(--hover) 60%); }
.col-body { flex:1; overflow-y:auto; }
.col-empty { padding:32px 18px; color:var(--text3); font-size:12px; line-height:1.5; text-align:center; }
.col-empty .hint { display:block; margin-top:10px; color:var(--text2); }

/* Status bar (P5 / progress bar zone) */
.statusbar { display:flex; align-items:center; gap:14px; height:24px; background:var(--statusbar);
    border-top:1px solid var(--border); padding:0 14px; font-size:11px; color:var(--text2); flex-shrink:0; }
.sb-pill { display:inline-flex; align-items:center; gap:5px; padding:1px 8px; border-radius:9px;
    background:var(--surface2); color:var(--text2); }
.sb-pill .v { color:var(--text); font-weight:600; }
.sb-pill.ok { color:var(--green); }
.sb-pill.warn { color:var(--orange); }
.sb-pill.err { color:var(--red); }
.sb-spacer { flex:1; }

/* Listing rows (P1, P2) */
.row { padding:10px 14px; border-bottom:1px solid var(--border); cursor:pointer; }
.row:hover { background:var(--hover); }
.row.active { background:var(--accent-bg); border-left:3px solid var(--accent); padding-left:11px; }
.row .r-top { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.row .r-icon { font-size:14px; opacity:.85; }
.row .r-title { flex:1; font-size:13px; font-weight:600; color:var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row .r-score { font-size:11px; padding:1px 6px; border-radius:8px; background:var(--accent-bg2); color:var(--accent); font-weight:600; }
.row .r-dismiss { font-size:14px; color:var(--text3); cursor:pointer; padding:1px 6px;
    user-select:none; line-height:1; border-radius:3px; }
.row .r-dismiss:hover { color:var(--red); background:var(--surface2); }
.row .r-meta { font-size:11px; color:var(--text2); display:flex; gap:8px; flex-wrap:wrap; }
.row .r-meta b { color:var(--text); font-weight:600; }
.row .r-tag { display:inline-block; padding:0 5px; border-radius:3px; font-size:10px;
    background:var(--surface2); color:var(--text2); }
.row .r-tag.bazaar { background:rgba(91,155,224,.2); color:var(--blue); }
.row .r-tag.own { background:rgba(78,201,112,.18); color:var(--green); }
.row .r-tag.urgent { background:rgba(229,85,97,.2); color:var(--red); }

/* P3 details panel */
.detail { padding:18px; overflow-y:auto; }
.detail h2 { font-size:15px; font-weight:600; margin-bottom:6px; }
.detail .sub { color:var(--text2); font-size:11px; margin-bottom:14px; }
.detail-block { background:var(--surface); border:1px solid var(--border); border-radius:6px;
    padding:12px 14px; margin-bottom:12px; }
.detail-block h4 { font-size:11px; text-transform:uppercase; letter-spacing:.05em;
    color:var(--text2); margin-bottom:8px; font-weight:600; }
.detail-row { display:flex; justify-content:space-between; gap:12px; padding:3px 0; font-size:12px; }
.detail-row .k { color:var(--text2); flex-shrink:0; }
.detail-row .v { color:var(--text); text-align:right; word-break:break-word; }
.actions-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:12px; }
.btn { padding:6px 12px; border:none; border-radius:4px; cursor:pointer; font-size:12px; font-weight:600;
    background:var(--surface2); color:var(--text); }
.btn:hover { background:var(--surface3); }
.btn-accent { background:var(--accent); color:#fff; }
.btn-accent:hover { background:var(--accent); opacity:.85; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
.btn-sm { padding:4px 10px; font-size:11px; }
.btn-disabled, .btn:disabled { opacity:.4; cursor:not-allowed; }
.raw-text { font-family:var(--font-mono); font-size:11px; color:var(--text2); white-space:pre-wrap;
    background:var(--surface2); padding:10px; border-radius:4px; max-height:240px; overflow-y:auto; }

/* P4 chat placeholder */
.chat-stub { padding:24px 20px; text-align:center; color:var(--text3); font-size:12px; line-height:1.5; }
.chat-stub .icon { font-size:30px; opacity:.4; margin-bottom:10px; }

/* Modal — used for + Publish wizard */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:50;
    display:none; align-items:center; justify-content:center; padding:24px; }
.modal-overlay.open { display:flex; }
.modal { background:var(--bg); border:1px solid var(--border); border-radius:8px;
    width:560px; max-width:100%; max-height:90vh; display:flex; flex-direction:column; overflow:hidden; }
.modal-head { display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px; border-bottom:1px solid var(--border); }
.modal-head h2 { font-size:14px; font-weight:600; }
.modal-body { padding:18px; overflow-y:auto; flex:1; }
.modal-foot { padding:12px 18px; border-top:1px solid var(--border); display:flex;
    justify-content:flex-end; gap:8px; }
.close-x { width:24px; height:24px; display:flex; align-items:center; justify-content:center;
    border-radius:4px; cursor:pointer; color:var(--text2); }
.close-x:hover { background:var(--hover); color:var(--text); }

/* Forms */
.field-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px 14px; }
.field-grid.three { grid-template-columns:1fr 1fr 1fr; }
.field { display:flex; flex-direction:column; }
.field.full { grid-column:1/-1; }
.field label { font-size:10px; color:var(--text2); margin-bottom:3px; text-transform:uppercase;
    letter-spacing:.05em; font-weight:600; }
.field input, .field select, .field textarea { padding:6px 9px; background:var(--surface);
    border:1px solid var(--border); border-radius:4px; outline:none; }
.field input:focus, .field select:focus, .field textarea:focus { border-color:var(--accent); }
.field textarea { min-height:64px; resize:vertical; font-family:var(--font-ui); }
.skipi-feedback-stars { display:flex; gap:6px; margin:8px 0 16px; }
.skipi-feedback-stars button { width:36px; height:36px; border:1px solid var(--border);
    border-radius:5px; background:var(--surface); color:var(--text3); cursor:pointer; font-size:22px; line-height:1; }
.skipi-feedback-stars button:hover, .skipi-feedback-stars button.on { color:var(--yellow); border-color:var(--yellow); background:rgba(226,185,61,.12); }
.skipi-feedback-note { color:var(--text2); font-size:12px; line-height:1.45; margin-bottom:16px; }
.skipi-feedback-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:16px; }
.side-cards { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:18px; }
.side-card { background:var(--surface); border:1px solid var(--border); border-radius:6px;
    padding:18px; cursor:pointer; text-align:center; }
.side-card:hover { border-color:var(--accent); }
.side-card .icon { font-size:32px; margin-bottom:8px; }
.side-card h3 { font-size:13px; font-weight:600; margin-bottom:4px; }
.side-card p { font-size:11px; color:var(--text2); }

/* Settings modal (inherits modal-overlay) */
.set-modal { width:760px; height:520px; max-width:96vw; max-height:90vh; }
.set-layout { display:flex; flex:1; overflow:hidden; }
.set-nav { width:200px; background:var(--surface); border-right:1px solid var(--border); overflow-y:auto; padding:8px 0; }
.set-nav-item { padding:8px 18px; cursor:pointer; font-size:12px; color:var(--text2); }
.set-nav-item:hover { color:var(--text); background:var(--hover); }
.set-nav-item.active { color:#fff; background:var(--accent); }
.set-body { flex:1; padding:22px 26px; overflow-y:auto; }
.set-body h3 { font-size:14px; margin-bottom:4px; font-weight:600; }
.set-body .sub { font-size:11px; color:var(--text2); margin-bottom:16px; }

/* Toasts */
.toast-host { position:fixed; right:14px; bottom:34px; display:flex; flex-direction:column; gap:8px; z-index:100; }
.toast { padding:10px 14px; background:var(--surface); border:1px solid var(--border);
    border-radius:6px; font-size:12px; box-shadow:0 4px 16px rgba(0,0,0,.4); }
.toast.error { border-color:var(--red); }
.toast.ok { border-color:var(--green); }
</style>
</head>
<body>

<div class="modules-bar">
    <div class="mod-tab active" id="nav-bazaar" onclick="showView('bazaar')">🛒 Базар</div>
    <div class="mod-tab" id="nav-publish" onclick="openPublishModal()">＋ Опубликовать</div>
    <div class="mb-spacer"></div>
    <div class="mb-identity" id="mb-identity">Не зарегистрирован</div>
    <div class="mb-gear" onclick="openSettings()" title="Settings">⚙</div>
</div>

<div class="app">
    <div class="columns" id="columns">
        <!-- P0 — details of selected own listing (sticky anchor across panels) -->
        <div class="col" style="flex:1.3">
            <div class="col-head">
                <span>Моя циркуляция</span>
                <span class="count" id="p0-age"></span>
            </div>
            <div class="col-body" id="p0-body"></div>
        </div>
        <!-- P1 — my listings -->
        <div class="col" style="flex:1.0">
            <div class="col-head">
                <span>Мои циркуляции</span>
                <span class="count" id="p1-count">0</span>
            </div>
            <div class="col-body" id="p1-body"></div>
        </div>
        <!-- P2 — matches for selected P1 -->
        <div class="col" style="flex:1.4">
            <div class="col-head">
                <span>Совпадения</span>
                <span style="display:flex; gap:4px;">
                    <span class="p2-tab" id="p2-tab-all" onclick="p2SetFilter('all')">All</span>
                    <span class="p2-tab" id="p2-tab-work" onclick="p2SetFilter('work')">📌 В работе</span>
                </span>
                <span class="p2-refresh" id="p2-refresh" title="Запросить апдейт у агента — подтянуть свежие сигналы из mbox/ShipNext и пересчитать совпадения. Закреплённые (📌) сохранятся." onclick="actionAgentUpdate()">🔄</span>
                <span class="count" id="p2-count">0</span>
            </div>
            <div class="col-body" id="p2-body"></div>
        </div>
        <!-- P3 — counterparty details for selected match -->
        <div class="col" style="flex:1.6">
            <div class="col-head">
                <span>Детали контрагента</span>
                <span class="count" id="p3-score"></span>
            </div>
            <div class="col-body" id="p3-body"></div>
        </div>
        <!-- P4 — chat (E2E or fallback) -->
        <div class="col" style="flex:1.2">
            <div class="col-head">
                <span>Чат</span>
                <span class="count" id="p4-status"></span>
            </div>
            <div class="col-body" id="p4-body"></div>
        </div>
    </div>
    <div class="statusbar" id="statusbar">
        <span class="sb-pill"><span>Базар</span>: <span class="v" id="sb-bazaar-total">0</span></span>
        <span class="sb-pill ok"><span>Покрытие</span>: <span class="v" id="sb-coverage">0%</span></span>
        <span class="sb-pill"><span>Свежие совпадения</span>: <span class="v" id="sb-fresh">0</span></span>
        <span class="sb-spacer"></span>
        <span id="sb-server" class="sb-pill">—</span>
    </div>
</div>

<!-- Publish modal -->
<div class="modal-overlay" id="publish-overlay" onclick="if(event.target===this)closePublishModal();">
    <div class="modal">
        <div class="modal-head">
            <h2 id="publish-title">+ Опубликовать циркуляцию</h2>
            <div class="close-x" onclick="closePublishModal()">×</div>
        </div>
        <div class="modal-body" id="publish-body"></div>
        <div class="modal-foot" id="publish-foot"></div>
    </div>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settings-overlay" onclick="if(event.target===this)closeSettings();">
    <div class="modal set-modal">
        <div class="modal-head">
            <h2>Настройки</h2>
            <div class="close-x" onclick="closeSettings()">×</div>
        </div>
        <div class="set-layout">
            <div class="set-nav" id="set-nav"></div>
            <div class="set-body" id="set-body"></div>
        </div>
    </div>
</div>

<!-- Feedback modal -->
<div class="modal-overlay" id="feedback-overlay" onclick="if(event.target===this)postponeFeedback();">
    <div class="modal" style="width:520px;">
        <div class="modal-head">
            <h2>Оцените Skipi</h2>
            <div class="close-x" onclick="postponeFeedback()">×</div>
        </div>
        <div class="modal-body" id="feedback-body"></div>
        <div class="modal-foot" id="feedback-foot"></div>
    </div>
</div>

<div class="toast-host" id="toast-host"></div>

<script>
"use strict";

// ---------- Tauri bridge ----------
var invoke = (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke)
    || (window.__TAURI__ && window.__TAURI__.invoke)
    || function(){ return Promise.reject(new Error("Tauri bridge unavailable — open via Skipi Broker app, not file://")); };

// ---------- Global state ----------
var state = {
    settings: { server_url:'', broker_id:'', display_name:'', reply_to:'', bearer_token:'' },
    myCargo: [],
    myTonnage: [],
    selectedListing: null,   // { kind:'cargo'|'tonnage', id:'...' }
    inbox: { own_matches:[], bazaar_matches:[] },
    selectedMatch: null,     // { type:'own'|'bazaar', data:{...} }
    publish: { side:null },  // null | 'cargo' | 'tonnage'
    settingsTab: 'connection',
};

var appFeedbackPromptScheduled = false;
var appFeedbackRating = 0;
var appFeedbackContext = 'manual';

// ---------- Util ----------
function esc(s){ return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function val(id){ var el=document.getElementById(id); return el ? (el.value||'').trim() : ''; }
function intOrNull(id){ var v=val(id); return v===''?null:parseInt(v,10); }
function toIsoOrNull(id){ var v=val(id); return v===''?null:(new Date(v)).toISOString(); }
function showToast(msg, kind){
    var host=document.getElementById('toast-host');
    var d=document.createElement('div');
    d.className='toast '+(kind||'');
    d.textContent=msg;
    host.appendChild(d);
    setTimeout(function(){ try{ host.removeChild(d); }catch(_){} }, 3500);
}

// ---------- Diagnostics ----------
function diagnosticsScreen(){
    try {
        if(state && state.view) return String(state.view);
        var active=document.querySelector('.tab.active,[data-view].active,.nav-item.active');
        if(active) return active.getAttribute('data-view') || active.id || active.textContent || 'unknown';
    } catch(e) {}
    return 'unknown';
}
function scrubDiagnosticText(v){
    var s=String(v==null?'':v);
    s=s.replace(/Bearer\s+[A-Za-z0-9._~+/=-]+/g,'Bearer [redacted]');
    s=s.replace(/token["'\s:=]+[A-Za-z0-9._~+/=-]{12,}/ig,'token=[redacted]');
    return s.slice(0,4000);
}
function reportAppDiagnostic(eventType,severity,message,details){
    try {
        var body=Object.assign({screen:diagnosticsScreen(), href:location.hash||location.pathname, ts:new Date().toISOString()}, details||{});
        invoke('record_app_diagnostic',{
            appVersion:APP_VERSION,
            eventType:eventType,
            severity:severity||'error',
            message:scrubDiagnosticText(message),
            locale:'ru',
            context:diagnosticsScreen(),
            detailsJson:JSON.stringify(body)
        }).catch(function(){});
    } catch(e) {}
}
function startAppDiagnostics(){
    try {
        invoke('init_app_diagnostics',{appVersion:APP_VERSION,locale:'ru',context:diagnosticsScreen()}).catch(function(){});
        setInterval(function(){
            try { invoke('app_heartbeat',{appVersion:APP_VERSION,lastScreen:diagnosticsScreen()}).catch(function(){}); } catch(e) {}
        },10000);
        var lastTick=Date.now();
        setInterval(function(){
            var now=Date.now(), lag=now-lastTick-15000;
            lastTick=now;
            if(lag>45000) reportAppDiagnostic('ui_lag','warn','UI event loop lag '+Math.round(lag/1000)+'s',{lag_ms:lag});
        },15000);
        window.addEventListener('beforeunload',function(){ try { invoke('mark_app_shutdown').catch(function(){}); } catch(e) {} });
        window.addEventListener('error',function(ev){
            reportAppDiagnostic('js_error','error',ev.message||'JS error',{filename:ev.filename,line:ev.lineno,column:ev.colno,stack:ev.error&&ev.error.stack});
        });
        window.addEventListener('unhandledrejection',function(ev){
            var reason=ev.reason;
            reportAppDiagnostic('unhandledrejection','error',reason&&reason.message?reason.message:String(reason),{stack:reason&&reason.stack});
        });
    } catch(e) {}
}

// ---------- App feedback ----------
function feedbackPromptFlag(st){
    return !!(st && (st.should_prompt || st.shouldPrompt));
}
function maybePromptForFeedback(context){
    if(appFeedbackPromptScheduled) return;
    appFeedbackPromptScheduled = true;
    setTimeout(async function(){
        try {
            if(document.getElementById('feedback-overlay').classList.contains('open')) return;
            var st = await invoke('get_feedback_prompt_state', { appVersion: APP_VERSION });
            if(feedbackPromptFlag(st)) openFeedbackDialog(context || 'auto');
        } catch(e) {}
    }, 90000);
}
function feedbackStarsHtml(){
    var h = '<div class="skipi-feedback-stars" id="feedback-stars">';
    for(var i=1;i<=5;i++){
        h += '<button type="button" class="'+(i<=appFeedbackRating?'on':'')+'" onclick="setFeedbackRating('+i+')" aria-label="'+i+'">★</button>';
    }
    h += '</div>';
    return h;

function fmtDate(iso){

}
function fmtRange(from, to){
    if(!from && !to) return '—';
    if(from && to) return fmtDate(from)+'..'+fmtDate(to);
    return fmtDate(from||to);
}
function truncate(s, n){ s=String(s||''); return s.length>n ? s.slice(0,n-1)+'…' : s; }

// Age ring: always visible. Outer ring = age color (green/yellow/orange/red),
// inner pie-sweep grows clockwise from 12 o'clock to mark elapsed time
// within the 12h "fresh competition window". 12h+ = solid red disc.
// Brokers compete on speed; this is a glance-level "how late am I" cue.
function ageRingSvg(ts, size){
    if(!ts) return '';
    var d = new Date(ts);
    if(isNaN(d.getTime())) return '';
    var ageH = (Date.now() - d.getTime()) / 3600000;
    if(ageH < 0) ageH = 0;
    var sz = size || 14;
    var r = sz/2 - 1.5;
    var cx = sz/2, cy = sz/2;
    var color = ageH<=2  ? '#4ec970'  // bright green: 0-2h
              : ageH<=6  ? '#a4c248'  // yellow-green: 2-6h
              : ageH<=12 ? '#e2b93d'  // amber: 6-12h
              : ageH<=24 ? '#e55561'  // red: 12-24h
              :            '#a02530'; // dark red: >24h
    var ageLabel = ageH<1 ? Math.round(ageH*60)+'m'
                 : ageH<24 ? ageH.toFixed(1)+'h'
                 :          (ageH/24).toFixed(1)+'d';
    // Pie sweep within 12h window — fills clockwise from top
    var pct = Math.min(1, ageH / 12);
    var sweep = '';
    if (pct > 0) {
        if (pct >= 0.999) {
            sweep = '<circle cx="'+cx+'" cy="'+cy+'" r="'+(r-1.5)+'" fill="'+color+'"/>';
        } else {
            var angle = pct * 2 * Math.PI - Math.PI/2;  // start at 12 o'clock
            var x = cx + (r-1.5) * Math.cos(angle);
            var y = cy + (r-1.5) * Math.sin(angle);
            var largeArc = pct > 0.5 ? 1 : 0;
            sweep = '<path d="M '+cx+' '+cy+' L '+cx+' '+(cy-(r-1.5))
                  +' A '+(r-1.5)+' '+(r-1.5)+' 0 '+largeArc+' 1 '+x.toFixed(2)+' '+y.toFixed(2)
                  +' Z" fill="'+color+'" opacity="0.45"/>';
        }
    }
    return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'" '
        +'style="vertical-align:middle; flex-shrink:0;">'
        +'<title>возраст: '+ageLabel+'</title>'
        +sweep
        +'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="1.5"/>'
        +'</svg>';
}

// Best-effort age timestamp for a P2 row: bazaar uses first_seen_at on
// the signal; own × own uses created_at on the match itself.
function rowAgeTimestamp(type, data){
    if(type==='bazaar'){
        var sig = data.bazaar_cargo_signal || data.bazaar_tonnage_signal;
        return sig && (sig.first_seen_at || sig.last_seen_at);
    }
    return data.created_at;
}

async function refreshInbox(){
    try {

        // Sending snake_case keys like listing_id silently drops them.
        var args = {};

// Phone numbers usually live in the raw description (email signature)
// rather than in any structured field. Extract them client-side after
// fetching the inbox so the WA button + badges work without a server
// schema change. Server-side enrichment can be added later if scoring
// needs to depend on phone availability.
function _extractPhone(text){
    if(!text) return null;
    // 1) Keyword-prefixed: "phone: +90 555 123-45-67" / "WhatsApp +44..."
    var m = text.match(/(?:phone|tel|whatsapp|wa|viber|mob|cell|gsm)[\s:.\-]{0,5}((?:\+|00)\d[\d \-()]{7,}\d)/i);
    if(m) return _cleanPhone(m[1]);
    // 2) Bare international: "+90 5345 678 901"
    m = text.match(/\+\d{1,3}[\s\-]?\d[\d \-()]{6,}\d/);
    if(m) return _cleanPhone(m[0]);
    return null;
}
function _cleanPhone(s){
    s = s.replace(/[\s\-()]/g, '');
    if(s.indexOf('00') === 0) s = '+' + s.slice(2);
    return s;
}
function enrichInboxContacts(){
    (state.inbox.bazaar_matches || []).forEach(function(m){
        var reasons = m.reasons = m.reasons || {};
        if(reasons.contact_phone) return;
        var sig = m.bazaar_cargo_signal || m.bazaar_tonnage_signal;
        var phone = sig && _extractPhone(sig.description || '');
        if(phone){
            reasons.contact_phone = phone;
            reasons.contact_source = reasons.contact_source || 'desc_regex';
        }
        // Also fill email from posted_by_email if reasons.contact_email empty.
        if(!reasons.contact_email && sig && sig.posted_by_email){
            reasons.contact_email = sig.posted_by_email;
            reasons.contact_source = reasons.contact_source || 'signal_from';
        }
    });
}

// ---------- P1 — my listings ----------
function renderP0(){
    var body = document.getElementById('p0-body');
    var ageEl = document.getElementById('p0-age');

        body.innerHTML = '<div class="col-empty">Выбери циркуляцию справа чтобы увидеть её детали тут.</div>';
        ageEl.innerHTML = '';
        return;
    }
    // Find the full data from the lists (selectedListing only stores id+kind).
    var pool = state.selectedListing.kind==='cargo' ? state.myCargo : state.myTonnage;
    var d = (pool||[]).filter(function(x){ return x.id===state.selectedListing.id; })[0];
    if(!d){
        body.innerHTML = '<div class="col-empty">Циркуляция не найдена (возможно истекла).</div>';
        ageEl.innerHTML = '';
        return;
    }
    var kind = state.selectedListing.kind;
    var title = d.title || (kind==='cargo'
        ? (d.cargo_type+' '+d.load_port+'/'+d.disch_port)
        : (d.vessel_name || ('IMO '+d.vessel_imo)));
    var tag = kind==='cargo'
        ? '<span class="r-tag" style="background:rgba(229,153,57,.2); color:#e29a39;">📦 cargo</span>'
        : '<span class="r-tag" style="background:rgba(91,155,224,.2); color:var(--blue);">🚢 tonnage</span>';

    ageEl.innerHTML = ageRingSvg(d.published_at, 14);

    var html = '<div class="detail">';
    html += '<h2>'+esc(title)+'</h2>';
    html += '<div class="sub">'+tag+' &nbsp; опубликовано '+esc(fmtDate(d.published_at));
    if(d.expires_at) html += ' · истекает '+esc(fmtDate(d.expires_at));
    html += '</div>';

    var fields = [];
    if(kind==='cargo'){
        if(d.cargo_type) fields.push(['Cargo', d.cargo_type]);
        if(d.quantity_mt) fields.push(['Quantity', d.quantity_mt+' mt'+(d.quantity_tolerance_pct?' ±'+d.quantity_tolerance_pct+'%':'')]);
        if(d.stowage_factor) fields.push(['SF', d.stowage_factor]);
        if(d.load_port) fields.push(['Load', d.load_port+(d.load_country?' ('+d.load_country+')':'')]);
        if(d.disch_port) fields.push(['Discharge', d.disch_port+(d.disch_country?' ('+d.disch_country+')':'')]);
        fields.push(['Laycan', fmtRange(d.laycan_from, d.laycan_to)]);
    } else {
        if(d.vessel_name) fields.push(['Vessel', d.vessel_name]);
        if(d.vessel_imo) fields.push(['IMO', imoLinkHtml(d.vessel_imo), true]);
        if(d.vessel_type) fields.push(['Type', d.vessel_type]);
        if(d.dwt) fields.push(['DWT', d.dwt]);
        if(d.flag) fields.push(['Flag', d.flag]);
        if(d.commercial_manager) fields.push(['Comm. manager', d.commercial_manager]);
        if(d.open_port) fields.push(['Open', d.open_port+(d.open_country?' ('+d.open_country+')':'')]);
        fields.push(['Window', fmtRange(d.open_from, d.open_to)]);
        if(d.redelivery_area) fields.push(['Redelivery', d.redelivery_area]);
    }
    if(d.rate_indication) fields.push(['Rate', d.rate_indication]);
    if(d.russia_trading) fields.push(['Russia', 'YES']);

    html += '<div class="detail-block"><h4>Структурированные детали</h4>';
    fields.forEach(function(f){
        var v = f[2] ? f[1] : esc(f[1]);
        html += '<div class="detail-row"><span class="k">'+esc(f[0])+'</span><span class="v">'+v+'</span></div>';
    });
    html += '</div>';

    // Original / posting context
    var posted = d.posted_as || 'broker';
    var postingFields = [['Posted as', posted]];
    if(d.representing_principal) postingFields.push(['Representing', d.representing_principal]);
    if(d.redacted_principal) postingFields.push(['Principal (redacted)', d.redacted_principal]);
    if(d.reply_to) postingFields.push(['Reply-to', d.reply_to]);
    html += '<div class="detail-block"><h4>Размещение</h4>';
    postingFields.forEach(function(f){
        html += '<div class="detail-row"><span class="k">'+esc(f[0])+'</span><span class="v">'+esc(f[1])+'</span></div>';
    });
    html += '</div>';

    if(d.description){
        html += '<div class="detail-block"><h4>Полный текст</h4>';
        html += '<div class="raw-text">'+esc(d.description)+'</div></div>';
    }

    // Quick stats — what the bazaar engagement model is showing.
    var stats = [];
    if(d.view_count != null) stats.push(['Views', d.view_count]);
    if(d.like_count != null) stats.push(['Likes', d.like_count]);
    if(d.interest_count != null) stats.push(['Interest', d.interest_count]);
    if(d.hide_count != null) stats.push(['Hides', d.hide_count]);
    if(stats.length){
        html += '<div class="detail-block"><h4>Engagement</h4>';
        stats.forEach(function(f){
            html += '<div class="detail-row"><span class="k">'+esc(f[0])+'</span><span class="v">'+esc(f[1])+'</span></div>';
        });
        html += '</div>';
    }

    html += '<div class="actions-row">';
    html += '<button class="btn btn-outline" onclick="actionCloseListing()">✕ Снять с базара</button>';
    html += '</div>';
    html += '</div>';
    body.innerHTML = html;
}

function renderP1(){
    var body = document.getElementById('p1-body');
    var rows = [];
    state.myCargo.forEach(function(c){ rows.push({kind:'cargo', data:c}); });
    state.myTonnage.forEach(function(t){ rows.push({kind:'tonnage', data:t}); });
    // Hide circulations older than 12h: stale data only adds noise,
    // counterparties have moved on. Mirrors the P2 freshness rule.
    rows = rows.filter(function(r){
        var ts = r.data.published_at;
        if(!ts) return true;
        var ageH = (Date.now() - new Date(ts).getTime()) / 3600000;
        return ageH <= 12;
    });
    document.getElementById('p1-count').textContent = rows.length;
    if(rows.length===0){
        body.innerHTML = '<div class="col-empty">Нет свежих циркуляций.<span class="hint">Старее 12ч скрыты. Нажми <b>＋ Publish</b> или жди свежий поток с базара.</span></div>';
        return;
    }
    // Freshest at the top.
    rows.sort(function(a,b){
        return (b.data.published_at||'').localeCompare(a.data.published_at||'');
    });
    body.innerHTML = rows.map(function(r){
        var d = r.data;
        var sel = state.selectedListing && state.selectedListing.id===d.id;
        var icon = r.kind==='cargo' ? '📦' : '🚢';
        var title = d.title || (r.kind==='cargo' ? (d.cargo_type+' '+d.load_port+'/'+d.disch_port) : (d.vessel_name||('IMO '+d.vessel_imo)));
        var meta = r.kind==='cargo'
            ? (d.quantity_mt?d.quantity_mt+'mt · ':'')+'laycan '+fmtRange(d.laycan_from, d.laycan_to)
            : (d.dwt?d.dwt+' DWT · ':'')+'open '+(d.open_port||'?')+' '+fmtRange(d.open_from, d.open_to);
        var ageHtml = ageRingSvg(d.published_at, 14);
        return '<div class="row '+(sel?'active':'')+'" onclick="selectListing(\''+r.kind+'\',\''+esc(d.id)+'\')">'
            +'<div class="r-top"><span class="r-icon">'+icon+'</span>'
            +'<span class="r-title">'+esc(truncate(title,42))+'</span>'
            +ageHtml
            +'</div>'
            +'<div class="r-meta">'+esc(meta)+'</div>'
            +'</div>';
    }).join('');
}

// ---------- P2 — matches feed ----------
//
// Filter: only show matches we can actually act on — both email AND
// phone available (either from the signal itself or from our owners
// DB via the AI matcher's enrichment). Without both channels the
// match is half-actionable and clutters the panel.
//
// Sort: smallest first. For tonnage signals (cargo own listing → vessel
// candidates), DWT ascending. For cargo signals (tonnage own listing →
// cargo candidates), quantity ascending. Matches Tymur's broker
// preference: start from his small-fleet niche and scale up only if
// nothing fits.
function _matchSize(m){
    var sig = m.bazaar_cargo_signal || m.bazaar_tonnage_signal || {};
    if(m.bazaar_tonnage_signal) return Number(sig.dwt || 0);
    if(m.bazaar_cargo_signal) return Number(sig.quantity_mt || 0);
    return 0;
}
function _hasEmail(m){
    var sig = m.bazaar_cargo_signal || m.bazaar_tonnage_signal || {};
    var r = m.reasons || {};
    return !!(r.contact_email || sig.posted_by_email);
}
function _hasPhone(m){
    var r = m.reasons || {};
    return !!r.contact_phone;
}

function p2SetFilter(mode){
    state.p2Filter = mode;
    renderP2();
}

function _matchAgeHours(type, m){
    var ts = rowAgeTimestamp(type, m);
    if(!ts) return null;
    var d = new Date(ts);
    if(isNaN(d.getTime())) return null;
    var h = (Date.now() - d.getTime()) / 3600000;
    return h < 0 ? 0 : h;
}

function _isPinned(type, m){
    if(type==='bazaar') return !!m.pinned_at;
    var side = m.cargo_broker_id===state.settings.broker_id ? 'cargo' : 'tonnage';
    return side==='cargo' ? !!m.cargo_pinned_at : !!m.tonnage_pinned_at;
}

function renderP2(){
    var body = document.getElementById('p2-body');
    // Hide ALL own × own matches. Tymur + Sasha (and future team-mates)
    // work as one team — matches between team brokers are not
    // actionable deals. Will revisit when external brokers register and
    // peer-to-peer becomes meaningful.
    var ownM = [];
    var bazM = state.inbox.bazaar_matches || [];
    var filter = state.p2Filter || 'all';

    var tabAll  = document.getElementById('p2-tab-all');
    var tabWork = document.getElementById('p2-tab-work');
    if(tabAll)  tabAll.classList.toggle('active', filter==='all');
    if(tabWork) tabWork.classList.toggle('active', filter==='work');

    var pinnedCount = ownM.filter(function(m){ return _isPinned('own', m); }).length
                    + bazM.filter(function(m){ return _isPinned('bazaar', m); }).length;
    document.getElementById('p2-count').textContent = filter==='work'
        ? pinnedCount
        : (ownM.length + bazM.length);

    if(filter==='all' && !state.selectedListing){
        body.innerHTML = '<div class="col-empty">Выбери циркуляцию слева чтобы увидеть совпадения.<span class="hint">Или переключись на «📌 В работе» — там видно всё закреплённое сразу.</span></div>';
        return;
    }
    if(ownM.length===0 && bazM.length===0){
        body.innerHTML = '<div class="col-empty">Совпадений пока нет.<span class="hint">Базар обновляется автоматически — вернись позже.</span></div>';
        return;
    }
    var rows = [];
    ownM.forEach(function(m){
        rows.push({ type:'own', score:m.score, data:m, _size:0, _pinned:_isPinned('own', m),
                    _ageH: _matchAgeHours('own', m) });
    });
    // All bazaar matches surface; user picks based on full info shown
    // in P3 (including raw original message). Contact extraction
    // (phone from email body) is a future enrichment step.
    bazM.forEach(function(m){
        rows.push({ type:'bazaar', score:m.score, data:m, _size:_matchSize(m), _pinned:_isPinned('bazaar', m),
                    _ageH: _matchAgeHours('bazaar', m) });
    });
    // Hard rule (Tymur 2026-05-12): drop matches whose signal is older
    // than 12h and we didn't engage with it. Someone else already
    // worked it — old signals are noise. No counter, no hint, no nudge:
    // если их нет, Тимур либо найдёт, либо подождёт. Pinned matches
    // survive (we're working that chain).
    rows = rows.filter(function(r){
        if(r._pinned) return true;
        return !(r._ageH != null && r._ageH > 12);
    });
    if(filter==='work'){
        rows = rows.filter(function(r){ return r._pinned; });
    }
    if(rows.length===0){
        body.innerHTML = '<div class="col-empty"></div>';
        return;
    }
    rows.sort(function(a,b){
        // Pinned always first; then freshest (smallest age) — fresh
        // signals = highest fix probability; older ones (within the
        // 12h visibility window) sink to the bottom. Score is the
        // final tie-breaker.
        if(a._pinned !== b._pinned) return a._pinned ? -1 : 1;
        var aA = a._ageH == null ? 99 : a._ageH;
        var bA = b._ageH == null ? 99 : b._ageH;
        if(aA !== bA) return aA - bA;
        return b.score - a.score;
    });
    body.innerHTML = rows.map(function(r){
        var sel = state.selectedMatch && state.selectedMatch.data.id===r.data.id;
        var tag, title, meta, contactBadge='';
        var pinHtml = r._pinned ? '<span class="r-pin" title="В работе">📌</span>' : '';
        // Hot pair: server reported freshness bonus (both sides <=2h).
        // Visual cue that this match has highest fix probability.
        var reasons = r.data.reasons || {};
        var hotHtml = (reasons && (reasons.hot_pair === true || reasons.freshness_bonus))
            ? '<span class="r-hot" title="Hot pair: обе стороны <2h">🔥</span>' : '';
        if(r.type==='own'){
            tag = '<span class="r-tag own">peer</span>';
            title = r.data.cargo_listing_id===state.selectedListing.id ? 'Tonnage match' : 'Cargo match';
            // Show the counterparty broker_id — the one that ISN'T mine.
            // Previous version showed our own broker_id which made every
            // inter-broker peer match look like a self-match.
            var myBid = state.settings.broker_id;
            var counter = r.data.cargo_broker_id === myBid ? r.data.tonnage_broker_id : r.data.cargo_broker_id;
            meta = 'broker '+esc((counter||'').slice(0,8));
        } else {
            tag = '<span class="r-tag bazaar">базар</span>';
            var sig = r.data.bazaar_cargo_signal || r.data.bazaar_tonnage_signal || {};
            title = sig.title || (sig.vessel_name || sig.cargo_type || '—');
            if(sig.vessel_name && sig.dwt) meta = sig.dwt+' DWT · open '+(sig.open_port||'?')+' '+fmtRange(sig.open_from, sig.open_to);
            else if(sig.cargo_type) meta = (sig.quantity_mt?sig.quantity_mt+'mt · ':'')+(sig.load_port||'?')+'/'+(sig.disch_port||'?');
            else meta = sig.source || '—';
            // Tiny inline indicator of available contact channels.
            // Lets the eye scan for actionable matches without
            // hiding the rest.
            var hasE = _hasEmail(r.data), hasP = _hasPhone(r.data);
            contactBadge = '<span style="margin-left:6px; font-size:10px; color:'
                + (hasE && hasP ? 'var(--green)' : (hasE ? 'var(--yellow)' : 'var(--text3)'))
                + ';" title="email: ' + (hasE?'yes':'no') + ' · phone: ' + (hasP?'yes':'no') + '">'
                + (hasE ? '📧' : '·') + (hasP ? '💬' : '·')
                + '</span>';
        }
        var ageHtml = ageRingSvg(rowAgeTimestamp(r.type, r.data), 14);
        // Hover-only "×" — let broker mark this match as not-interesting
        // without drilling into P3. Pinned rows hide the × (it's their
        // active conversation; dismiss is the wrong gesture).
        var dismissHtml = r._pinned ? '' :
            '<span class="r-dismiss" title="Скрыть как неинтересное" onclick="event.stopPropagation(); dismissRow(\''+r.type+'\',\''+esc(r.data.id)+'\')">✕</span>';
        return '<div class="row '+(sel?'active':'')+(r._pinned?' pinned':'')+(hotHtml?' hot':'')+'" onclick="selectMatch(\''+r.type+'\',\''+esc(r.data.id)+'\')">'
            +'<div class="r-top">'
            +pinHtml
            +hotHtml
            +tag
            +'<span class="r-title">'+esc(truncate(title,38))+'</span>'
            +contactBadge
            +ageHtml
            +'<span class="r-score">'+r.score+'</span>'
            +dismissHtml
            +'</div>'
            +'<div class="r-meta">'+esc(meta)+'</div>'
            +'</div>';
    }).join('');
}

async function dismissRow(type, id){
    try {
        if(type==='bazaar'){
            await invoke('dismiss_bazaar_match', { matchId:id });
        } else {
            // own × own dismiss is per-side
            var pool = state.inbox.own_matches || [];
            var m = pool.filter(function(x){ return x.id===id; })[0];
            if(!m) return;
            var side = m.cargo_broker_id===state.settings.broker_id ? 'cargo' : 'tonnage';
            await invoke('dismiss_match', { matchId:id, side:side });
        }
        if(state.selectedMatch && state.selectedMatch.data.id===id){
            state.selectedMatch = null;
        }
        await refreshInbox();
        renderP2(); renderP3(); renderP4(); renderStatusBar();
    } catch(e){
        showToast('dismiss: '+e, 'error');
    }
}

function selectMatch(type, id){
    var pool = type==='own' ? state.inbox.own_matches : state.inbox.bazaar_matches;
    var match = (pool||[]).filter(function(m){ return m.id===id; })[0];
    if(!match) return;
    state.selectedMatch = { type:type, data:match };
    if(type==='bazaar'){
        invoke('mark_bazaar_match_seen', {matchId:id}).catch(function(e){ console.warn('seen failed', e); });
    } else {
        var side = match.cargo_broker_id===state.settings.broker_id ? 'cargo' : 'tonnage';
        invoke('mark_match_seen', {matchId:id, side:side}).catch(function(e){ console.warn('seen failed', e); });
    }
    renderP2(); renderP3(); renderP4();
}

// ---------- P3 — counterparty details ----------
function renderP3(){
    var body = document.getElementById('p3-body');
    var scoreEl = document.getElementById('p3-score');
    if(!state.selectedMatch){
        body.innerHTML = '<div class="col-empty">Выбери совпадение в средней панели чтобы увидеть детали контрагента.</div>';
        scoreEl.textContent = '';
        return;
    }
    var m = state.selectedMatch.data;
    var ageTs = rowAgeTimestamp(state.selectedMatch.type, m);
    scoreEl.innerHTML = (ageTs ? ageRingSvg(ageTs, 14)+' ' : '')+'score '+m.score;

    if(state.selectedMatch.type==='bazaar'){
        renderP3Bazaar(body, m);
    } else {
        renderP3Own(body, m);
    }
}

function renderP3Bazaar(body, m){
    var sig = m.bazaar_cargo_signal || m.bazaar_tonnage_signal || {};
    var sigKind = m.bazaar_cargo_signal ? 'cargo' : 'tonnage';
    var fields = [];
    if(sigKind==='tonnage'){
        if(sig.vessel_name) fields.push(['Vessel', sig.vessel_name]);
        if(sig.vessel_imo) fields.push(['IMO', imoLinkHtml(sig.vessel_imo), true]);
        if(sig.vessel_type) fields.push(['Type', sig.vessel_type]);
        if(sig.dwt) fields.push(['DWT', sig.dwt]);
        if(sig.flag) fields.push(['Flag', sig.flag]);
        if(sig.commercial_manager) fields.push(['Comm. manager', sig.commercial_manager]);
        if(sig.open_port) fields.push(['Open', sig.open_port+(sig.open_country?' ('+sig.open_country+')':'')]);
        fields.push(['Window', fmtRange(sig.open_from, sig.open_to)]);
        if(sig.redelivery_area) fields.push(['Redelivery', sig.redelivery_area]);
    } else {
        if(sig.cargo_type) fields.push(['Cargo', sig.cargo_type]);
        if(sig.quantity_mt) fields.push(['Quantity', sig.quantity_mt+' mt']);
        if(sig.load_port) fields.push(['Load', sig.load_port+(sig.load_country?' ('+sig.load_country+')':'')]);
        if(sig.disch_port) fields.push(['Disch', sig.disch_port+(sig.disch_country?' ('+sig.disch_country+')':'')]);
        fields.push(['Laycan', fmtRange(sig.laycan_from, sig.laycan_to)]);
    }
    if(sig.rate_indication) fields.push(['Rate', sig.rate_indication]);

    var html = '<div class="detail">';
    html += '<h2>'+esc(sig.title || (sigKind==='tonnage'?'Vessel position':'Cargo'))+'</h2>';
    html += '<div class="sub">источник: '+esc(sig.source||'—')+' · '+esc(sig.signal_provenance||'')+' · впервые: '+esc(fmtDate(sig.first_seen_at))+'</div>';

    // Raw original message — surfaced FIRST so the broker reads what
    // the upstream party actually wrote (phone / extra context that
    // didn't survive parsing into structured fields). For mbox this
    // is the email body; for ShipNext it's the JSON payload; for
    // owners_db it's the roster entry summary.
    if(sig.description){
        html += '<div class="detail-block"><h4>Исходное сообщение</h4>';
        html += '<div class="raw-text">'+esc(sig.description)+'</div></div>';
    }

    html += '<div class="detail-block"><h4>Структурированные детали</h4>';
    fields.forEach(function(f){
        var v = f[2] ? f[1] : esc(f[1]);
        html += '<div class="detail-row"><span class="k">'+esc(f[0])+'</span><span class="v">'+v+'</span></div>';
    });
    html += '</div>';

    // Counterparty contact — comes from one of two places:
    //   (1) signal.posted_by_email — set when source=mbox (From: header)
    //   (2) match.reasons.contact_email/phone — enriched by freight_agent
    //       at AI matching time via vessel_db lookup (СПИСОК_ОВНЕРОВ.md).
    // The reasons-derived contact takes precedence because owner-side
    // contact is more useful than the broker who circulated.
    var reasons = m.reasons || {};
    var contactEmail = reasons.contact_email || sig.posted_by_email || '';
    var contactPhone = reasons.contact_phone || '';
    var contactName  = reasons.contact_name  || sig.posted_by_name || '';
    var contactCompany = reasons.contact_company || '';
    var contactSource = reasons.contact_source || (sig.posted_by_email ? 'signal_from' : '');

    html += '<div class="detail-block"><h4>Контакт публикатора</h4>';
    html += '<div class="detail-row"><span class="k">Email</span><span class="v">'+esc(contactEmail||'—')+'</span></div>';
    if(contactPhone) html += '<div class="detail-row"><span class="k">Phone</span><span class="v">'+esc(contactPhone)+'</span></div>';
    if(contactName) html += '<div class="detail-row"><span class="k">Имя</span><span class="v">'+esc(contactName)+'</span></div>';
    if(contactCompany) html += '<div class="detail-row"><span class="k">Компания</span><span class="v">'+esc(contactCompany)+'</span></div>';
    if(contactSource) html += '<div class="detail-row"><span class="k">Источник</span><span class="v" style="font-size:10px; color:var(--text3);">'+esc(contactSource)+'</span></div>';
    html += '</div>';

    // Action buttons — three channels (E2E in P4 separately).
    // .eml needs an email; WhatsApp needs a phone (or asks the user).
    html += '<div class="actions-row">';
    html += '<button class="btn btn-accent" '+(contactEmail?'':'disabled')+' onclick="actionEml()">📧 Generate .eml</button>';
    html += '<button class="btn" '+(contactPhone?'':'')+' onclick="actionWhatsApp()">💬 WhatsApp'+(contactPhone?'':' …')+'</button>';
    var adoptLabel = sigKind==='tonnage' ? '📋 Взять судно в работу' : '📋 Взять груз в работу';
    var adoptTitle = sigKind==='tonnage'
        ? 'Скопировать этот vessel-сигнал в мои циркуляции — matcher начнёт подбирать грузы под него'
        : 'Скопировать этот cargo-сигнал в мои циркуляции — matcher начнёт подбирать суда под него';
    html += '<button class="btn" title="'+esc(adoptTitle)+'" onclick="actionAdoptSignal()">'+adoptLabel+'</button>';
    var pinnedB = !!m.pinned_at;
    html += '<button class="btn '+(pinnedB?'btn-accent':'btn-outline')+'" onclick="actionTogglePin()">'+(pinnedB?'📌 В работе':'📌 В работу')+'</button>';
    html += '<button class="btn btn-outline" onclick="actionDismiss()">✕ Dismiss</button>';
    html += '</div>';

    // AI/rule reasoning behind this match
    if(m.reasons){
        var reasonsHidden = ['contact_email','contact_phone','contact_name','contact_company','contact_source'];
        html += '<div class="detail-block"><h4>Почему это совпадение</h4>';
        Object.keys(m.reasons).forEach(function(k){
            if(reasonsHidden.indexOf(k) >= 0) return;
            html += '<div class="detail-row"><span class="k">'+esc(k)+'</span><span class="v">'+esc(String(m.reasons[k]))+'</span></div>';
        });
        html += '</div>';
    }
    html += '</div>';
    body.innerHTML = html;
}

function renderP3Own(body, m){
    var html = '<div class="detail">';
    html += '<h2>Skipi peer match</h2>';
    html += '<div class="sub">обе стороны зарегистрированы в Skipi · score '+m.score+'</div>';
    html += '<div class="detail-block"><h4>Match</h4>';
    html += '<div class="detail-row"><span class="k">Cargo broker</span><span class="v"><code>'+esc(m.cargo_broker_id.slice(0,12))+'</code></span></div>';
    html += '<div class="detail-row"><span class="k">Tonnage broker</span><span class="v"><code>'+esc(m.tonnage_broker_id.slice(0,12))+'</code></span></div>';
    html += '</div>';
    if(m.reasons){
        html += '<div class="detail-block"><h4>Reasons</h4>';
        Object.keys(m.reasons).forEach(function(k){

        });
        html += '</div>';
    }
    var sideO = m.cargo_broker_id===state.settings.broker_id ? 'cargo' : 'tonnage';
    var pinnedO = sideO==='cargo' ? !!m.cargo_pinned_at : !!m.tonnage_pinned_at;
    html += '<div class="actions-row">';
    html += '<button class="btn '+(pinnedO?'btn-accent':'btn-outline')+'" onclick="actionTogglePin()">'+(pinnedO?'📌 В работе':'📌 В работу')+'</button>';
    html += '<button class="btn btn-outline" onclick="actionDismissOwn()">✕ Dismiss</button>';
    html += '</div>';
    html += '</div>';
    body.innerHTML = html;
}

// ---------- P4 — chat ----------

async function openWaChat(){
    if(!state.selectedMatch || state.selectedMatch.type!=='bazaar') return;
    var m = state.selectedMatch.data;
    var phone = (m.reasons||{}).contact_phone || '';
    if(!phone){ showToast('У этого контрагента нет телефона', 'error'); return; }

        await invoke('open_wa_chat', { phone:phone });
    } catch(e){
        showToast('WA: '+e, 'error');
    }
}

// ---------- Actions ----------
function buildEmailDraft(){
    if(!state.selectedMatch || state.selectedMatch.type!=='bazaar') return null;
    var m = state.selectedMatch.data;
    var sig = m.bazaar_cargo_signal || m.bazaar_tonnage_signal || {};
    var ownListing = currentOwnListing();
    var subject, body;
    if(m.bazaar_tonnage_signal){
        // Sasha has cargo, sees vessel signal — pitch the cargo.
        subject = 'RE: '+(sig.vessel_name||sig.title||'tonnage circular')+' — cargo proposal';
        body = 'Dear Sirs,\n\nNoted your circular for '+(sig.vessel_name||'subject vessel')+'.';
        if(ownListing){
            body += '\n\nWe have firm cargo as follows:\n';
            body += '- Cargo: '+(ownListing.cargo_type||'')+'\n';
            body += '- Quantity: '+(ownListing.quantity_mt||'?')+' mt\n';
            body += '- Loading: '+(ownListing.load_port||'?')+'\n';
            body += '- Discharge: '+(ownListing.disch_port||'?')+'\n';
            body += '- Laycan: '+fmtRange(ownListing.laycan_from, ownListing.laycan_to)+'\n';
            if(ownListing.rate_indication) body += '- Rate idea: '+ownListing.rate_indication+'\n';
        }
        body += '\nPlease confirm vessel position and indicate freight.\n\nBest regards,\n'+(state.settings.display_name||'');
    } else {
        // Sasha has tonnage, sees cargo signal — pitch the vessel.
        subject = 'RE: '+(sig.cargo_type||sig.title||'cargo enquiry')+' — vessel proposal';
        body = 'Dear Sirs,\n\nNoted your circular for '+(sig.cargo_type||'subject cargo')+' '+(sig.load_port||'')+'/'+(sig.disch_port||'')+'.';
        if(ownListing){
            body += '\n\nWe have firm tonnage as follows:\n';
            body += '- Vessel: '+(ownListing.vessel_name||('IMO '+ownListing.vessel_imo))+'\n';
            body += '- Type / DWT: '+(ownListing.vessel_type||'?')+' / '+(ownListing.dwt||'?')+'\n';
            body += '- Open: '+(ownListing.open_port||'?')+' '+fmtRange(ownListing.open_from, ownListing.open_to)+'\n';
            if(ownListing.commercial_manager) body += '- Manager: '+ownListing.commercial_manager+'\n';
            if(ownListing.rate_indication) body += '- Rate idea: '+ownListing.rate_indication+'\n';
        }
        body += '\nPlease confirm cargo readiness and freight idea.\n\nBest regards,\n'+(state.settings.display_name||'');
    }
    return { to_email: sig.posted_by_email||'', to_name: sig.posted_by_name||'', subject:subject, body:body };
}

function currentOwnListing(){
    if(!state.selectedListing) return null;
    var pool = state.selectedListing.kind==='cargo' ? state.myCargo : state.myTonnage;
    return pool.filter(function(x){ return x.id===state.selectedListing.id; })[0] || null;
}

function contactFromMatch(){
    if(!state.selectedMatch || state.selectedMatch.type!=='bazaar') return null;
    var m = state.selectedMatch.data;
    var sig = m.bazaar_cargo_signal || m.bazaar_tonnage_signal || {};
    var reasons = m.reasons || {};
    return {
        email: reasons.contact_email || sig.posted_by_email || '',
        phone: reasons.contact_phone || '',
        name:  reasons.contact_name  || sig.posted_by_name  || '',
    };
}

async function actionEml(){
    var draft = buildEmailDraft();
    if(!draft) return;
    var contact = contactFromMatch() || {};
    var email = contact.email || draft.to_email;
    if(!email){ showToast('No counterparty email available.', 'error'); return; }
    try {
        await invoke('generate_eml', {
            toEmail: email,
            toName: contact.name || draft.to_name,
            subject: draft.subject,
            body: draft.body
        });
        showToast('.eml opened in your mail client. Review and send.', 'ok');
    } catch(e){
        showToast('eml: '+e, 'error');
    }
}

async function actionWhatsApp(){
    var draft = buildEmailDraft();
    if(!draft) return;
    var contact = contactFromMatch() || {};
    var phone = contact.phone;
    if(!phone){
        phone = window.prompt('Phone number for WhatsApp (digits only, no +):', '');
        if(!phone) return;
    }
    try {
        await invoke('open_whatsapp', { phone:phone, message: draft.subject+'\n\n'+draft.body });
        showToast('WhatsApp opened. Review and send.', 'ok');
    } catch(e){
        showToast('WhatsApp: '+e, 'error');
    }
}

async function actionDismiss(){
    if(!state.selectedMatch || state.selectedMatch.type!=='bazaar') return;
    var id = state.selectedMatch.data.id;
    try {
        await invoke('dismiss_bazaar_match', { matchId:id });
        state.selectedMatch = null;
        await refreshInbox();
        renderP2(); renderP3(); renderP4(); renderStatusBar();
    } catch(e){
        showToast('dismiss: '+e, 'error');
    }
}

// Copy a bazaar signal into the broker's own circulations. The
// matcher then automatically pairs it against the opposite-side bazaar
// — i.e. adopting a vessel sets up cargo search for it, and vice versa.
// Posted as broker; description carries the original signal text so
// the broker keeps the upstream attribution / contact thread.
async function actionAdoptSignal(){
    if(!state.selectedMatch || state.selectedMatch.type!=='bazaar') return;
    var m = state.selectedMatch.data;
    var sigT = m.bazaar_tonnage_signal;
    var sigC = m.bazaar_cargo_signal;
    try {
        if(sigT){
            var draft = {
                title: sigT.title || null,
                vessel_imo: sigT.vessel_imo,
                vessel_name: sigT.vessel_name || null,
                vessel_type: sigT.vessel_type || null,
                dwt: sigT.dwt || null,
                flag: sigT.flag || null,
                commercial_manager: sigT.commercial_manager || null,
                open_port: sigT.open_port,
                open_country: sigT.open_country || null,
                open_from: sigT.open_from || null,
                open_to: sigT.open_to || null,
                redelivery_area: sigT.redelivery_area || null,
                rate_indication: sigT.rate_indication || null,
                russia_trading: !!sigT.russia_trading,
                description: sigT.description || null,
                posted_as: 'broker',
                representing_principal: sigT.posted_by_name || sigT.commercial_manager || null,
            };
            await invoke('publish_tonnage', { draft: draft });
            showToast('Судно взято в работу — matcher ищет грузы', 'success');
        } else if(sigC){
            var draftC = {
                title: sigC.title || null,
                cargo_type: sigC.cargo_type,
                quantity_mt: sigC.quantity_mt || null,
                load_port: sigC.load_port,
                load_country: sigC.load_country || null,
                disch_port: sigC.disch_port,
                disch_country: sigC.disch_country || null,
                laycan_from: sigC.laycan_from || null,
                laycan_to: sigC.laycan_to || null,
                rate_indication: sigC.rate_indication || null,
                russia_trading: !!sigC.russia_trading,
                description: sigC.description || null,
                posted_as: 'broker',
                representing_principal: sigC.posted_by_name || null,
            };
            await invoke('publish_cargo', { draft: draftC });
            showToast('Груз взят в работу — matcher ищет суда', 'success');
        } else {
            showToast('Сигнал не содержит ни груза, ни судна', 'error');
            return;
        }
        await refreshAll();
    } catch(e){
        showToast('Adopt: '+e, 'error');
    }
}

async function actionDismissOwn(){
    if(!state.selectedMatch || state.selectedMatch.type!=='own') return;
    var m = state.selectedMatch.data;
    var side = m.cargo_broker_id===state.settings.broker_id ? 'cargo' : 'tonnage';
    try {
        await invoke('dismiss_match', { matchId:m.id, side:side });
        state.selectedMatch = null;
        await refreshInbox();
        renderP2(); renderP3(); renderP4();
    } catch(e){
        showToast('dismiss: '+e, 'error');
    }
}

async function actionAgentUpdate(){
    var btn = document.getElementById('p2-refresh');
    if(btn.classList.contains('spinning')) return;  // debounce
    btn.classList.add('spinning');
    try {
        var r = await invoke('request_agent_update');
        var c = (r && r.cargo_inserted) || 0;
        var t = (r && r.tonnage_inserted) || 0;
        var m = (r && r.matches_created) || 0;
        var msg = 'Агент обновил базар: +'+c+' cargo · +'+t+' tonnage · +'+m+' матчей';
        if(c===0 && t===0 && m===0) msg = 'Агент проверил: новых сигналов нет';
        await refreshInbox();
        renderP0(); renderP1(); renderP2(); renderP3(); renderP4(); renderStatusBar();
        showToast(msg, 'success');
    } catch(e){
        showToast('Agent: '+e, 'error');
    } finally {
        btn.classList.remove('spinning');
    }
}

async function actionTogglePin(){
    if(!state.selectedMatch) return;
    var m = state.selectedMatch.data;
    try {
        var updated;
        if(state.selectedMatch.type==='bazaar'){
            var fn = m.pinned_at ? 'unpin_bazaar_match' : 'pin_bazaar_match';
            updated = await invoke(fn, { matchId:m.id });
        } else {
            var side = m.cargo_broker_id===state.settings.broker_id ? 'cargo' : 'tonnage';
            var sidePinned = side==='cargo' ? m.cargo_pinned_at : m.tonnage_pinned_at;
            var fnO = sidePinned ? 'unpin_match' : 'pin_match';
            updated = await invoke(fnO, { matchId:m.id, side:side });
        }
        state.selectedMatch.data = updated;
        await refreshInbox();
        // Re-select same match from refreshed pool so detail stays open
        var pool = state.selectedMatch.type==='own' ? state.inbox.own_matches : state.inbox.bazaar_matches;
        var same = (pool||[]).filter(function(x){ return x.id===m.id; })[0];
        if(same) state.selectedMatch.data = same;
        renderP2(); renderP3(); renderStatusBar();
        showToast(updated.pinned_at || updated.cargo_pinned_at || updated.tonnage_pinned_at ? 'Закреплено: в работе' : 'Откреплено', 'success');
    } catch(e){
        showToast('pin: '+e, 'error');
    }
}

// ---------- Status bar ----------
function renderStatusBar(){
    var own = state.inbox.own_matches || [];
    var baz = state.inbox.bazaar_matches || [];
    // "Свежие" = younger than 12h or pinned. Stale matches are filtered
    // out of P2; the counter must match what the user actually sees,
    // not the raw server payload.
    var isFresh = function(type, m){
        if(_isPinned(type, m)) return true;
        var h = _matchAgeHours(type, m);
        return h == null || h <= 12;
    };
    var freshOwn = own.filter(function(m){ return isFresh('own', m); }).length;
    var freshBaz = baz.filter(function(m){ return isFresh('bazaar', m); }).length;
    document.getElementById('sb-bazaar-total').textContent = freshBaz;
    document.getElementById('sb-fresh').textContent = freshOwn + freshBaz;
    var totalListings = state.myCargo.length + state.myTonnage.length;
    var anyFresh = freshOwn + freshBaz > 0 ? 1 : 0;
    var coverage = totalListings>0 ? Math.round((anyFresh / Math.max(1, totalListings)) * 100) : 0;
    document.getElementById('sb-coverage').textContent = coverage+'%';
}

async function submitCargo(){
    var draft = {
        title: val('pf-title') || null,
        cargo_type: val('pf-cargo-type'),
        quantity_mt: intOrNull('pf-qty'),
        load_port: val('pf-load-port'),
        load_country: val('pf-load-country') || null,
        disch_port: val('pf-disch-port'),
        disch_country: val('pf-disch-country') || null,
        laycan_from: toIsoOrNull('pf-laycan-from'),
        laycan_to: toIsoOrNull('pf-laycan-to'),
        rate_indication: val('pf-rate') || null,
        russia_trading: val('pf-russia')==='true',
        description: val('pf-desc') || null,
        posted_as: val('pf-posted-as') || 'broker',
        representing_principal: val('pf-rep-principal') || null,
    };
    if(!draft.cargo_type || !draft.load_port || !draft.disch_port){
        showToast('Нужны тип груза, порт погрузки и порт выгрузки.', 'error');
        return;
    }
    try {
        await invoke('publish_cargo', { draft:draft });
        showToast('Груз опубликован.', 'ok');
        closePublishModal();
        await refreshAll();
    } catch(e){ showToast('Публикация не удалась: '+e, 'error'); }
}

async function submitTonnage(){
    var imo = intOrNull('pf-imo');
    if(!imo || imo<1000000 || imo>9999999){
        showToast('IMO должен быть 7-значным номером.', 'error');
        return;
    }
    var draft = {
        title: val('pf-title') || null,
        vessel_imo: imo,
        vessel_name: val('pf-vname') || null,
        vessel_type: val('pf-vtype') || null,
        dwt: intOrNull('pf-dwt'),
        flag: val('pf-flag') || null,
        commercial_manager: val('pf-cmm') || null,
        open_port: val('pf-open-port'),
        open_country: val('pf-open-country') || null,
        open_from: toIsoOrNull('pf-open-from'),
        open_to: toIsoOrNull('pf-open-to'),
        redelivery_area: val('pf-redelivery') || null,
        rate_indication: val('pf-rate') || null,
        russia_trading: val('pf-russia')==='true',
        description: val('pf-desc') || null,
        posted_as: val('pf-posted-as') || 'broker',
        representing_principal: val('pf-rep-principal') || null,
    };
    if(!draft.open_port){ showToast('Укажите порт открытия.', 'error'); return; }
    try {
        await invoke('publish_tonnage', { draft:draft });
        showToast('Тоннаж опубликован.', 'ok');
        closePublishModal();
        await refreshAll();
    } catch(e){ showToast('Публикация не удалась: '+e, 'error'); }
}

// ---------- Settings ----------
function openSettings(){
    document.getElementById('settings-overlay').classList.add('open');
    renderSettingsNav(); renderSettingsBody();
}
function closeSettings(){
    document.getElementById('settings-overlay').classList.remove('open');
}
function renderSettingsNav(){
    var tabs = [
        {id:'connection', label:'Подключение'},
        {id:'identity',   label:'Профиль брокера'},
        {id:'reply',      label:'Reply-to'},
        {id:'appearance', label:'Внешний вид'},
        {id:'about',      label:'О программе'},
    ];
    document.getElementById('set-nav').innerHTML = tabs.map(function(t){
        return '<div class="set-nav-item '+(state.settingsTab===t.id?'active':'')
            +'" onclick="state.settingsTab=\''+t.id+'\'; renderSettingsNav(); renderSettingsBody();">'+esc(t.label)+'</div>';
    }).join('');
}

    var body = document.getElementById('set-body');

    var t = state.settingsTab;
    if(t==='connection'){
        body.innerHTML = '<h3>Подключение к серверу</h3><div class="sub">Доска брокера по умолчанию идет через Timeweb, с резервом на основной сервер.</div>'+
            '<div class="field-grid">'+
                '<div class="field full"><label>Server URL</label><input id="set-server" value="'+esc(s.server_url||'')+'" placeholder="https://api-ru.skipi.app"></div>'+
                '<div class="field full"><label>Bearer token</label><input id="set-bearer" value="'+esc(s.bearer_token||'')+'" placeholder="токен доступа"></div>'+
            '</div>'+
            '<div style="margin-top:18px;"><button class="btn btn-accent" onclick="saveConnection()">Сохранить</button></div>';
    } else if(t==='identity'){
        body.innerHTML = '<h3>Профиль брокера</h3><div class="sub">Регистрация участника на сервере.</div>'+
            '<div class="field-grid">'+
                '<div class="field full"><label>Имя/компания</label><input id="set-display" value="'+esc(s.display_name||'')+'"></div>'+
                '<div class="field full"><label>Контактный email</label><input id="set-contact" value="'+esc(s.reply_to||'')+'"></div>'+
            '</div>'+
            '<div style="margin-top:18px;">'+

                    : '')+

            '</div>'+
            '<hr style="margin:22px 0; border:none; border-top:1px solid var(--border);">'+
            '<h4 style="margin-bottom:4px;">Командный режим</h4>'+
            '<div class="sub" style="margin-bottom:10px;">Вставь broker_id напарника чтобы видеть его циркуляции и совпадения как свои. Полезно для команд из нескольких человек на одном аккаунте.</div>'+
            '<div class="field-grid">'+
                '<div class="field full"><label>Team broker_id</label><input id="set-team-bid" value="'+esc(s.broker_id||'')+'" placeholder="вставь UUID"></div>'+
            '</div>'+

    } else if(t==='reply'){
        body.innerHTML = '<h3>Reply-to</h3><div class="sub">Отправитель в подготовленных .eml письмах.</div>'+
            '<div class="field-grid">'+
                '<div class="field full"><label>Имя отправителя</label><input id="set-fname" value="'+esc(s.display_name||'')+'"></div>'+

            '</div>'+

async function saveConnection(){
    var s = state.settings;
    s.server_url = val('set-server');
    s.bearer_token = val('set-bearer');
    try { state.settings = await invoke('save_settings', { incoming:s }); showToast('Сохранено.', 'ok'); refreshIdentityBadge(); }
    catch(e){ showToast('Save: '+e, 'error'); }
}
async function saveReply(){
    var s = state.settings;
    s.display_name = val('set-fname');
    s.reply_to = val('set-femail');
    try { state.settings = await invoke('save_settings', { incoming:s }); showToast('Сохранено.', 'ok'); refreshIdentityBadge(); }
    catch(e){ showToast('Save: '+e, 'error'); }
}
async function registerBroker(){
    var name = val('set-display'); var email = val('set-contact');
    if(!name || !email){ showToast('Укажите имя и email.', 'error'); return; }
    try {
        await invoke('register_broker', { displayName:name, contactEmail:email });
        state.settings = await invoke('get_settings');
        refreshIdentityBadge();
        showToast('Зарегистрирован: '+state.settings.broker_id, 'ok');
        renderSettingsBody();
        await refreshAll();
    } catch(e){ showToast('Register: '+e, 'error'); }
}

async function overrideBrokerId(){
    var newId = (val('set-team-bid')||'').trim();
    if(!newId || newId.length < 30){
        showToast('Вставь полный UUID brokerа.', 'error'); return;
    }
    var s = state.settings;
    s.broker_id = newId;
    try {
        state.settings = await invoke('save_settings', { incoming:s });
        refreshIdentityBadge();
        showToast('Использую team broker_id: '+newId.slice(0,8), 'ok');
        await refreshAll();
        renderSettingsBody();
    } catch(e){ showToast('Override: '+e, 'error'); }
}
